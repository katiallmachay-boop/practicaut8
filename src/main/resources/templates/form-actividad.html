<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Actividad</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Nueva Actividad</h2>
    <form th:action="@{/guardarActividad}" th:object="${actividad}" method="post" class="col-md-6">
        <div class="mb-3">
            <label class="form-label">Nombre:</label>
            <input type="text" th:field="*{nombre}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Monitor:</label>
            <input type="text" th:field="*{monitor}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Duración (min):</label>
            <input type="number" th:field="*{duracion}" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success">Guardar</button>
        <a th:href="@{/inicio}" class="btn btn-secondary">Cancelar</a>
    </form>
</body>
</html>
