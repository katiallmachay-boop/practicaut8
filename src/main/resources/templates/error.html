<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error - Campamento de Verano</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .error-container { height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="container error-container text-center">
        <div class="card shadow p-5">
            <h1 class="display-1 fw-bold text-danger">404 / 500</h1>
            <h2 class="mb-4">¡Ups! Algo ha salido mal</h2>
            <p class="lead mb-5">Parece que la página que buscas no existe o ha ocurrido un error en el servidor del campamento.</p>
            <div>
                <a th:href="@{/inicio}" class="btn btn-primary btn-lg">Volver al Inicio</a>
            </div>
            <div class="mt-4">
                <img src="https://cdn-icons-png.flaticon.com/512/5994/5994850.png" alt="Error Icon" style="width: 100px; opacity: 0.5;">
            </div>
        </div>
    </div>
</body>
</html>
